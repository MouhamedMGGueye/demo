name: Test Code Checkout

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4
      
      - name: Lister les fichiers du projet
        run: ls -la
      
      - name: Afficher le contenu d'un fichier
        run: cat README.md